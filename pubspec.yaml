name: works
description: "تطبيق وركرز - ربط العملاء بالحرفيين"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0

  # Routing
  go_router: ^15.0.0

  # Dependency Injection
  get_it: ^8.0.3

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.4

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  intl_phone_field: ^3.2.0

  # Utilities
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  image_picker: ^1.1.2
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  cloudinary_public: ^0.23.1
  http: ^1.6.0
  crypto: ^3.0.7
  dart_jsonwebtoken: ^2.14.3
  flutter_animate: ^4.3.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.14.2
  geoflutterfire_plus: ^0.0.32
  cloud_functions: ^5.6.2
  firebase_app_check: ^0.3.2+10
  pinput: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
